<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      background: #202123;
      color: #ececec;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 16px;
    }

    .logo-icon {
      font-size: 16px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      color: #ececec;
      letter-spacing: 0.01em;
    }

    .divider {
      height: 1px;
      background: #3e3f4b;
      margin-bottom: 16px;
    }

    .section-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .field-group {
      margin-bottom: 10px;
    }

    input[type="password"] {
      width: 100%;
      background: #2d2e36;
      border: 1px solid #4a4b5a;
      border-radius: 6px;
      color: #ececec;
      padding: 7px 9px;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="password"]:focus {
      border-color: #10a37f;
    }

    input[type="password"]::placeholder {
      color: #666;
    }

    button {
      width: 100%;
      padding: 7px;
      border-radius: 6px;
      border: none;
      background: #10a37f;
      color: white;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button:hover { background: #0e9270; }

    button.secondary {
      background: none;
      border: 1px solid #4a4b5a;
      color: #aaa;
      margin-top: 8px;
    }

    button.secondary:hover { background: #2d2e36; color: #ececec; }

    .msg {
      margin-top: 8px;
      font-size: 11px;
      min-height: 15px;
      text-align: center;
    }

    .msg.success { color: #10a37f; }
    .msg.error   { color: #f87171; }

    .section { margin-bottom: 16px; }

    .state-no-password .change-section { display: none; }
    .state-has-password .set-section  { display: none; }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-icon">🔒</span>
    <span class="logo-text">Chat Locker</span>
  </div>
  <div class="divider"></div>

  <div style="font-size: 11px; color: #555; margin-bottom: 14px; line-height: 1.5;">
    <span style="color:#444;">⌨</span> <kbd style="background:#2d2e36;border:1px solid #3e3f4b;border-radius:3px;padding:1px 5px;font-size:10px;color:#888;">Ctrl+Shift+H</kbd> hide/show locked chats
  </div>

  <!-- Set initial password (shown only when no password exists) -->
  <div class="section set-section">
    <div class="section-label">Set master password</div>
    <div class="field-group">
      <input type="password" id="newPass1" placeholder="New password">
    </div>
    <div class="field-group">
      <input type="password" id="newPass2" placeholder="Confirm password">
    </div>
    <button id="setBtn">Set Password</button>
    <div class="msg" id="setMsg"></div>
  </div>

  <!-- Change password (shown only when password exists) -->
  <div class="section change-section">
    <div class="section-label">Change master password</div>
    <div class="field-group">
      <input type="password" id="currentPass" placeholder="Current password">
    </div>
    <div class="field-group">
      <input type="password" id="changePass1" placeholder="New password">
    </div>
    <div class="field-group">
      <input type="password" id="changePass2" placeholder="Confirm new password">
    </div>
    <button id="changeBtn">Update Password</button>
    <div class="msg" id="changeMsg"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
